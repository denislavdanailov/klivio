<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KLivio - AI Automation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-C0E9jYvU.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/chunk-CaILmz35.js">
    <link rel="stylesheet" crossorigin href="/assets/index-D2c6Tr_2.css">
    <style>
      /* ── BUG FIX 1 & 3: text-white/28 not compiled in Tailwind output → add it ── */
      .text-white\/28 {
        color: rgba(255, 255, 255, 0.65) !important;
      }
      /* Slightly boost the NOT FOR YOU IF section label too */
      .text-white\/30 {
        color: rgba(255, 255, 255, 0.55) !important;
      }

      /* ── BUG FIX 2: Spline white gap — force all Spline containers dark ── */
      spline-viewer,
      spline-viewer::part(container),
      canvas {
        background: transparent !important;
      }
      /* Any div containing the spline canvas gets dark bg during load */
      [style*="contain: paint"] {
        background: #030303 !important;
      }

      /* ── FIX: dark text unreadable on dark background ── */
      p, span, div, li, h1, h2, h3, h4, h5, h6, a, label {
        color: inherit;
      }
      /* Force any black or near-black text to be readable */
      [style*="color: #000"],
      [style*="color:#000"],
      [style*="color: black"],
      [style*="color:black"],
      [style*="color: rgb(0"],
      [style*="color: rgba(0, 0, 0"] {
        color: rgba(255, 255, 255, 0.75) !important;
      }
      /* Hero subtext — force all low-opacity white text to be readable */
      .text-black, [class*="text-black"] {
        color: rgba(255, 255, 255, 0.7) !important;
      }
      .text-white\/20, .text-white\/25, .text-white\/30, .text-white\/35, .text-white\/40 {
        color: rgba(255, 255, 255, 0.6) !important;
      }
      /* Badge "LIMITED ONBOARDING" — make text bolder and more visible */
      [class*="rounded-full"][class*="border"] {
        border-color: rgba(230, 184, 75, 0.6) !important;
        background: rgba(230, 184, 75, 0.08) !important;
      }
      [class*="rounded-full"][class*="border"] span,
      [class*="rounded-full"][class*="border"] {
        color: #e6b84b !important;
        font-weight: 700 !important;
        letter-spacing: 0.15em !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
    function openKlivioModal(plan) {
      var GOLD = '#e6b84b';
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,0.88);backdrop-filter:blur(10px)';
      overlay.innerHTML = '<div style="position:relative;width:100%;max-width:480px;border-radius:16px;overflow:hidden;background:#0e0e0e;border:1px solid rgba(230,184,75,0.3)">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:28px 32px 20px;border-bottom:1px solid rgba(255,255,255,0.07)">' +
          '<div><span style="font-family:Inter,sans-serif;font-weight:900;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:'+GOLD+'">'+plan.name+' · '+plan.price+'/mo</span>' +
          '<p style="font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:900;color:#fff;font-size:18px;margin-top:4px">Tell us about your business</p></div>' +
          '<button id="kl-modal-close" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:20px;line-height:1">✕</button>' +
        '</div>' +
        '<form id="kl-modal-form" style="padding:24px 32px;display:flex;flex-direction:column;gap:16px">' +
          '<div><label style="font-family:Inter,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.35);display:block;margin-bottom:6px">Full name <span style="color:'+GOLD+'">*</span></label>' +
          '<input name="name" required placeholder="John Smith" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#fff;font-family:Inter,sans-serif;font-size:14px;outline:none"></div>' +
          '<div><label style="font-family:Inter,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.35);display:block;margin-bottom:6px">Email <span style="color:'+GOLD+'">*</span></label>' +
          '<input name="email" type="email" required placeholder="john@business.com" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#fff;font-family:Inter,sans-serif;font-size:14px;outline:none"></div>' +
          '<div><label style="font-family:Inter,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.35);display:block;margin-bottom:6px">Phone <span style="color:rgba(255,255,255,0.3);font-size:9px;text-transform:none;letter-spacing:0">(optional)</span></label>' +
          '<input name="phone" type="tel" placeholder="+44 7xxx xxxxxx" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#fff;font-family:Inter,sans-serif;font-size:14px;outline:none"></div>' +
          '<div><label style="font-family:Inter,sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(255,255,255,0.35);display:block;margin-bottom:6px">Website <span style="color:rgba(255,255,255,0.3);font-size:9px;text-transform:none;letter-spacing:0">(optional)</span></label>' +
          '<input name="website" placeholder="https://yourbusiness.com" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;color:#fff;font-family:Inter,sans-serif;font-size:14px;outline:none"></div>' +
          '<button type="submit" style="width:100%;padding:14px;border-radius:12px;background:'+GOLD+';color:#080808;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:0.1em;border:none;cursor:pointer;margin-top:8px" id="kl-modal-submit">Continue to Payment →</button>' +
          '<p id="kl-modal-err" style="color:#ff6b6b;font-size:12px;text-align:center;display:none">Something went wrong — please try again.</p>' +
        '</form></div>';
      document.body.appendChild(overlay);
      document.getElementById('kl-modal-close').onclick = function() { document.body.removeChild(overlay); };
      overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });
      document.getElementById('kl-modal-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('kl-modal-submit');
        btn.textContent = 'Processing...'; btn.disabled = true;
        var fd = new FormData(e.target);
        try {
          var r = await fetch('https://klivio-production.up.railway.app/api/order', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ source:'website', name:fd.get('name'), email:fd.get('email'), phone:fd.get('phone'), website:fd.get('website'), product:plan.name, price:plan.price+'/mo' })
          });
          if (!r.ok) throw new Error();
          window.location.href = plan.stripeLink;
        } catch(err) {
          document.getElementById('kl-modal-err').style.display = 'block';
          btn.textContent = 'Continue to Payment →'; btn.disabled = false;
        }
      });
    }

    (function() {
      var GOLD = '#e6b84b';
      var cardBase = 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1)';
      var cardFeatured = 'background:rgba(230,184,75,0.07);border:1px solid rgba(230,184,75,0.4);box-shadow:0 0 80px rgba(230,184,75,0.14)';

      function makeCard(cfg) {
        var d = document.createElement('div');
        d.className = 'rounded-2xl p-5 flex flex-col relative overflow-hidden transition-all';
        d.style.cssText = cfg.featured ? cardFeatured : cardBase;
        var featuredLine = cfg.featured ? '<div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#e6b84b,transparent)"></div>' : '';
        var badge = cfg.badge ? '<span style="font-family:Inter,sans-serif;font-weight:900;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:'+GOLD+';margin-bottom:16px;display:block">'+cfg.badge+'</span>' : '';
        var feats = cfg.features.map(function(f){ return '<li style="display:flex;align-items:flex-start;gap:8px;font-family:Inter,sans-serif;font-size:12px;color:rgba(255,255,255,0.55);line-height:1.5"><span style="color:'+GOLD+';margin-top:2px;flex-shrink:0">&#10003;</span>'+f+'</li>'; }).join('');
        d.innerHTML = featuredLine + badge +
          '<h3 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:900;text-transform:uppercase;font-size:11px;letter-spacing:0.22em;color:rgba(255,255,255,0.4);margin-bottom:16px">'+cfg.name+'</h3>'+
          '<div style="margin-bottom:12px"><span style="font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:900;font-size:2.6rem;color:#fff;line-height:1">'+cfg.price+'</span><span style="font-family:Inter,sans-serif;font-size:13px;color:rgba(255,255,255,0.35)">/mo</span></div>'+
          '<p style="font-family:Inter,sans-serif;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px;line-height:1.6">'+cfg.desc+'</p>'+
          '<ul style="list-style:none;padding:0;margin:0 0 24px;display:flex;flex-direction:column;gap:8px">'+feats+'</ul>'+
          '<a href="'+cfg.link+'" style="margin-top:auto;display:block;text-align:center;padding:13px 20px;border-radius:12px;font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:700;font-size:13px;text-decoration:none;transition:opacity 0.2s;background:'+(cfg.featured?GOLD:'transparent')+';color:'+(cfg.featured?'#080808':GOLD)+';border:1px solid '+(cfg.featured?'transparent':GOLD)+'">'+cfg.cta+'</a>';
        return d;
      }

      function inject() {
        var h3s = document.querySelectorAll('h3');
        var starterH3 = null;
        for (var i = 0; i < h3s.length; i++) {
          if (h3s[i].textContent.trim() === 'STARTER') { starterH3 = h3s[i]; break; }
        }
        if (!starterH3) return false;

        var starterCard = starterH3.closest('[class*="rounded-2xl"]');
        if (!starterCard) return false;
        var grid = starterCard.parentElement;
        if (!grid) return false;

        // Widen grid for more cards
        grid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(210px, 1fr))';

        // AI Quick Reply — insert before STARTER
        if (!document.getElementById('kl-quickreply')) {
          var qr = makeCard({
            name: 'QUICK REPLY',
            price: '$47',
            badge: '&#9889; TRY IT FIRST',
            desc: 'Auto-replies to every enquiry in under 2 minutes. Perfect entry point with zero risk.',
            features: ['AI Lead Responder', '24/7 — evenings & weekends', 'Setup in 1 day', 'Up to 200 contacts/month', 'Standard support'],
            link: '#',
            cta: 'Get Started →',
            featured: false
          });
          qr.id = 'kl-quickreply';
          qr.querySelector('a').addEventListener('click', function(ev) {
            ev.preventDefault();
            openKlivioModal({
              name: 'AI Quick Reply',
              price: '$47',
              stripeLink: 'https://buy.stripe.com/7sY00j6AF0LS6jl2z67Vm07'
            });
          });
          grid.insertBefore(qr, starterCard);
        }


        return true;
      }

      function fixModalLabels() {
        // Find React modal labels and add required/optional indicators
        var labels = document.querySelectorAll('[class*="fixed"][class*="inset"] label, [class*="z-"][class*="fixed"] label');
        labels.forEach(function(label) {
          var text = label.textContent.trim().toLowerCase();
          if ((text === 'full name' || text === 'email') && !label.querySelector('.kl-req')) {
            var req = document.createElement('span');
            req.className = 'kl-req';
            req.style.cssText = 'color:#e6b84b;margin-left:3px';
            req.textContent = '*';
            label.appendChild(req);
          }
          if ((text === 'phone' || text === 'website') && !label.querySelector('.kl-opt')) {
            var opt = document.createElement('span');
            opt.className = 'kl-opt';
            opt.style.cssText = 'color:rgba(255,255,255,0.3);font-size:9px;margin-left:4px;text-transform:none;letter-spacing:0';
            opt.textContent = '(optional)';
            label.appendChild(opt);
          }
        });
      }

      function fixHero() {
        // Remove "LIMITED ONBOARDING — Q2 2026" badge
        var allEls = document.querySelectorAll('*');
        for (var i = 0; i < allEls.length; i++) {
          if (allEls[i].children.length === 0 && allEls[i].textContent.indexOf('LIMITED ONBOARDING') !== -1) {
            var badge = allEls[i].closest('[class*="rounded-full"]') || allEls[i].closest('[class*="border"]') || allEls[i].parentElement;
            if (badge) badge.style.display = 'none';
            break;
          }
        }
        // Replace the onboarding restriction text
        var els = document.querySelectorAll('*');
        for (var j = 0; j < els.length; j++) {
          if (els[j].children.length === 0 && els[j].textContent.indexOf("Klivio's onboarding is handled") !== -1) {
            els[j].textContent = 'Setup takes 2–7 days. No contracts, no setup fees. Cancel anytime.';
            els[j].style.color = 'rgba(255,255,255,0.55)';
            break;
          }
        }
        return document.querySelector('[class*="rounded-full"]') !== null || true;
      }

      function injectAll() {
        var ok = inject();
        fixHero();
        fixModalLabels();
        return ok;
      }

      // Re-run fixModalLabels when modal opens (React renders it dynamically)
      var modalObs = new MutationObserver(function() { fixModalLabels(); });
      modalObs.observe(document.body, { childList: true, subtree: true });

      if (!injectAll()) {
        var obs = new MutationObserver(function() { if (injectAll()) { obs.disconnect(); } });
        obs.observe(document.body, { childList: true, subtree: true });
        setTimeout(injectAll, 4000);
      }
    })();
    </script>
  </body>
</html>
