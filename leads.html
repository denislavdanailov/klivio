<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Klivio — All Leads</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0d0b;color:#e8e4dc;font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh}
.topbar{background:#1a1814;border-bottom:1px solid #2a2520;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:18px;color:#c9a84c;font-weight:600}
.topbar .nav{display:flex;gap:12px}
.topbar a{color:#8a8070;text-decoration:none;font-size:13px;padding:6px 14px;border-radius:6px;transition:all .2s}
.topbar a:hover,.topbar a.active{background:#2a2520;color:#e8e4dc}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.login input{background:#1a1814;border:1px solid #2a2520;color:#e8e4dc;padding:12px 16px;border-radius:8px;width:280px;font-size:14px;outline:none}
.login input:focus{border-color:#c9a84c}
.login button{background:#c9a84c;color:#1a1814;border:none;padding:12px 28px;border-radius:8px;font-weight:600;cursor:pointer;width:280px}
.main{padding:24px 28px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat{background:#1a1814;border:1px solid #2a2520;border-radius:10px;padding:16px 20px}
.stat .n{font-size:26px;font-weight:700;color:#c9a84c;line-height:1}
.stat .l{font-size:11px;color:#8a8070;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{background:#1a1814;border:1px solid #2a2520;color:#e8e4dc;padding:8px 12px;border-radius:8px;font-size:13px;outline:none}
.filters input{width:280px}
.filters input:focus,.filters select:focus{border-color:#c9a84c}
.filters .count{color:#8a8070;font-size:13px;margin-left:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#6a6055;border-bottom:1px solid #2a2520;position:sticky;top:57px;background:#0e0d0b;z-index:5}
tr{border-bottom:1px solid #1e1c18;transition:background .15s}
tr:hover{background:#141210}
td{padding:12px 14px;vertical-align:top}
.biz{font-weight:500;color:#e8e4dc;font-size:13px}
.em{color:#8a8070;font-size:12px;margin-top:2px;font-family:monospace}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:500}
.badge.new{background:#1a2d3a;color:#4da6d4}
.badge.sent{background:#1a2d2a;color:#4dd4a4}
.badge.error{background:#3a1a1a;color:#d44d4d}
.badge.duplicate{background:#2a2520;color:#8a8070}
.tag{display:inline-block;background:#2a2520;color:#c9a84c;padding:2px 8px;border-radius:12px;font-size:11px}
.src{color:#6a6055;font-size:11px;font-family:monospace}
.empty{text-align:center;padding:60px;color:#6a6055}
a.web{color:#c9a84c;font-size:12px;text-decoration:none}
a.web:hover{text-decoration:underline}
.pages{display:flex;gap:8px;margin-top:20px;justify-content:center;align-items:center}
.pages button{background:#1a1814;border:1px solid #2a2520;color:#e8e4dc;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.pages button:disabled{opacity:.4;cursor:not-allowed}
.pages .info{color:#8a8070;font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <h1>🎯 Leads Database</h1>
  <div class="nav">
    <a href="/admin">Orders</a>
    <a href="/leads" class="active">Leads</a>
    <a href="/sent">Sent Emails</a>
    <a href="/campaign">Campaign</a>
  </div>
</div>

<div id="loginView" class="login">
  <input id="keyInput" type="password" placeholder="Admin key" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Enter →</button>
</div>

<div id="mainView" class="main" style="display:none">
  <div class="stats" id="statsBar"></div>
  <div class="filters">
    <input type="text" id="search" placeholder="Search business, email, city, industry..." oninput="render()">
    <select id="statusFilter" onchange="render()">
      <option value="">All status</option>
      <option value="new">New</option>
      <option value="sent">Sent</option>
      <option value="error">Error</option>
      <option value="duplicate">Duplicate</option>
    </select>
    <select id="indFilter" onchange="render()"><option value="">All industries</option></select>
    <select id="cityFilter" onchange="render()"><option value="">All cities</option></select>
    <span class="count" id="countLabel"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Business</th>
        <th>Industry / City</th>
        <th>Status</th>
        <th>Source</th>
        <th>Added</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="emptyMsg" class="empty" style="display:none">No leads match your filter.</div>
  <div class="pages" id="pages"></div>
</div>

<script>
let KEY='', data=[], page=0, pageSize=100;

function login(){
  KEY=document.getElementById('keyInput').value.trim();
  fetch('/api/leads',{headers:{'x-admin-key':KEY}})
    .then(r=>{if(!r.ok)throw 0;return r.json()})
    .then(d=>{
      data=d;
      document.getElementById('loginView').style.display='none';
      document.getElementById('mainView').style.display='block';
      localStorage.setItem('klivio_admin_key',KEY);
      buildStats();
      buildFilters();
      render();
    })
    .catch(()=>alert('Wrong key'));
}

function buildStats(){
  const s={total:data.length,new:0,sent:0,error:0};
  const ind={},city={};
  data.forEach(l=>{
    s[l.status]=(s[l.status]||0)+1;
    ind[l.industry]=(ind[l.industry]||0)+1;
    if(l.city)city[l.city]=(city[l.city]||0)+1;
  });
  const topInd=Object.entries(ind).sort((a,b)=>b[1]-a[1]).slice(0,1)[0]||['',0];
  const topCity=Object.entries(city).sort((a,b)=>b[1]-a[1]).slice(0,1)[0]||['',0];
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="n">${s.total}</div><div class="l">Total leads</div></div>
    <div class="stat"><div class="n" style="color:#4da6d4">${s.new||0}</div><div class="l">Ready to send</div></div>
    <div class="stat"><div class="n" style="color:#4dd4a4">${s.sent||0}</div><div class="l">Already sent</div></div>
    <div class="stat"><div class="n" style="color:#d44d4d">${s.error||0}</div><div class="l">Errors</div></div>
    <div class="stat"><div class="n" style="font-size:18px">${topInd[0]} <span style="color:#6a6055;font-size:14px">(${topInd[1]})</span></div><div class="l">Top industry</div></div>
    <div class="stat"><div class="n" style="font-size:18px">${topCity[0]} <span style="color:#6a6055;font-size:14px">(${topCity[1]})</span></div><div class="l">Top city</div></div>
  `;
}

function buildFilters(){
  const inds=[...new Set(data.map(l=>l.industry).filter(Boolean))].sort();
  const cities=[...new Set(data.map(l=>l.city).filter(Boolean))].sort();
  const indSel=document.getElementById('indFilter');
  const citySel=document.getElementById('cityFilter');
  inds.forEach(i=>{const o=document.createElement('option');o.value=i;o.textContent=i;indSel.appendChild(o)});
  cities.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;citySel.appendChild(o)});
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const st=document.getElementById('statusFilter').value;
  const ind=document.getElementById('indFilter').value;
  const city=document.getElementById('cityFilter').value;
  const filtered=data.filter(l=>{
    if(st&&l.status!==st)return false;
    if(ind&&l.industry!==ind)return false;
    if(city&&l.city!==city)return false;
    if(q){
      const hay=[l.business,l.email,l.city,l.industry,l.website].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });
  document.getElementById('countLabel').textContent=`${filtered.length} of ${data.length}`;
  const pages=Math.ceil(filtered.length/pageSize);
  if(page>=pages)page=0;
  const slice=filtered.slice(page*pageSize,(page+1)*pageSize);
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('emptyMsg');
  if(!slice.length){tbody.innerHTML='';empty.style.display='block';renderPages(pages);return}
  empty.style.display='none';
  tbody.innerHTML=slice.map(l=>`
    <tr>
      <td>
        <div class="biz">${l.business||'—'}</div>
        <div class="em">${l.email}</div>
        ${l.website?`<a href="${l.website}" target="_blank" class="web">${l.website.replace(/^https?:\\/\\/(www\\.)?/,'').slice(0,40)}</a>`:''}
      </td>
      <td>
        <span class="tag">${l.industry||'—'}</span>
        <div class="em">${l.city||''}</div>
      </td>
      <td><span class="badge ${l.status}">${l.status}</span></td>
      <td><span class="src">${l.source||'—'}</span></td>
      <td class="em">${new Date(l.addedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</td>
    </tr>
  `).join('');
  renderPages(pages);
}

function renderPages(total){
  if(total<=1){document.getElementById('pages').innerHTML='';return}
  document.getElementById('pages').innerHTML=`
    <button onclick="page=Math.max(0,page-1);render()" ${page===0?'disabled':''}>← Prev</button>
    <span class="info">Page ${page+1} / ${total}</span>
    <button onclick="page=Math.min(${total-1},page+1);render()" ${page>=total-1?'disabled':''}>Next →</button>
  `;
}

const saved=localStorage.getItem('klivio_admin_key');
if(saved){document.getElementById('keyInput').value=saved;login()}
</script>
</body>
</html>
